description = "Quick toggle: set omi HUD visibility profile to normal."
prompt = """
Set omi HUD visibility profile to `normal`.

Protocol:
1. Apply `visibility = normal`.
2. If filesystem tools are available, write/update `.omi/state/hud.json` with source `omi:hud-on`.
3. Provide one-line HUD preview and recommended follow-up command.

Output format:
## HUD
- applied: normal
- persisted:

## Preview
```text
[omi][MODE balanced][STAGE team-exec][TASKS 3/8][RISKS 1][NEXT /omi:team-verify]
```

## Next Command
- /omi:status
"""
