description = "Run a task intent gate to classify the request and route to the right omi stage/command."
prompt = """
Run omi `intent` gate.

Input:
$ARGUMENTS

Protocol:
1. Classify the primary intent into one:
   - plan
   - prd
   - exec
   - verify
   - fix
   - research
   - lifecycle
2. Identify missing constraints or acceptance criteria needed before execution.
3. Detect command-intent mismatch (for example, implementation request but planning stage is missing).
4. Recommend the next omi command and agent handoff.
5. If filesystem tools are available, write/update `.omi/state/intent.md`.

Routing hints:
- planning ambiguity -> `/omi:team-plan`
- scope ambiguity -> `/omi:team-prd`
- implementation-ready -> `/omi:team-exec`
- validation request -> `/omi:team-verify`
- defect-only fix -> `/omi:team-fix`
- option research -> `$research`
- mode/lifecycle operations -> `/omi:mode`, `/omi:launch`, `/omi:checkpoint`, `/omi:stop`

Output format:
## Intent Gate
- primary intent:
- confidence:
- command-intent mismatch: yes/no

## Missing Inputs
- ...

## Recommended Route
- next command:
- delegate agents:

## Ready-to-Run Prompt
- ...
"""
