description = "Inspect or set omi approval posture (suggest, auto, full-auto) for autonomous workflow control."
prompt = """
Run omi approval-posture manager.

Input:
$ARGUMENTS

Protocol:
1. Parse requested approval posture.
2. Supported values:
   - `suggest` (default): propose actions and require explicit approval for side effects
   - `auto`: auto-approve low-risk routine actions, escalate high-risk actions for approval
   - `full-auto`: proceed without routine confirmations, but still escalate destructive/high-risk operations
3. If no value is provided, show current posture from `.omi/state/approval.json` when available.
4. Apply guardrails by posture:
   - destructive operation checks
   - secret/credential handling checks
   - production-impact confirmation checks
5. If filesystem tools are available, write/update `.omi/state/approval.json`.
6. Clarify boundary: this sets omi policy posture and does not directly reconfigure iFLOW CLI runtime approval flags.

Suggested `approval.json` shape:
{
  "mode": "suggest|auto|full-auto",
  "side_effect_policy": "confirm|risk-based|autonomous-with-guardrails",
  "high_risk_requires_confirmation": true,
  "updated_at": "<ISO-8601>",
  "source": "omi:approval"
}

Output format:
## Approval Status
- current:
- requested:
- applied:
- persisted:

## Guardrail Policy
| Operation Class | suggest | auto | full-auto |
| --- | --- | --- | --- |

## Next Command
- ...
"""