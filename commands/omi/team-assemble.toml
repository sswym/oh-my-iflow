description = "Stage 0/5: Dynamically assemble a task-fit agent team with approval gating and model-aware role assignment."
prompt = """
Run omi `team-assemble`.

Task:
$ARGUMENTS

Protocol:
1. Analyze task shape:
   - domain (engineering/research/analysis/content/ops/hybrid)
   - output target (code/report/plan/presentation)
   - risk and verification needs
2. Assemble two role groups:
   - domain specialists (problem-space experts)
   - format specialists (output-quality experts)
3. Build role lanes from omi agents:
   - orchestration lane: `omi-director`
   - exploration lane: `omi-researcher` (spawn multiple lanes when breadth is high)
   - decision lane: `omi-consultant` or `omi-architect`
   - execution lane: `omi-executor` when implementation is required
   - quality lane: `omi-reviewer`, `omi-verifier`, `omi-debugger`
   - editorial lane: `omi-editor` for final packaging
4. Assign model profiles by lane:
   - judgment and acceptance gates -> `glm-5`
   - implementation-heavy execution -> `glm-4.7`
   - broad low-risk exploration -> `glm-4.7` (upgrade to `glm-5` if depth is critical)
5. Define collaboration protocol:
   - explicit message flow between lanes
   - trigger conditions for verify/fix loops
   - fallback path when evidence conflicts or execution fails
6. Confirmation gate:
   - If input includes explicit approval tokens (`approve`, `approved`, `yes`, `go`, `run`), proceed to execution.
   - Otherwise stop after team proposal and ask: "Proceed with this team? (yes/no)"
7. Approved execution path:
   - Run `team-plan -> team-prd -> team-exec -> team-verify -> team-fix`.
   - Repeat `team-exec -> team-verify -> team-fix` until criteria pass or blockers are explicit.
8. If filesystem tools are available, write/update:
   - `.omi/state/team-assembly.md`
   - `.omi/state/workflow.md`

Output format:
## Team Fit Analysis
- task shape:
- required expertise:
- output target:
- risk posture:

## Proposed Team
| Role | Agent | Why This Role | Model Profile | Lanes |
| --- | --- | --- | --- | --- |

## Collaboration Protocol
- handoff graph:
- verify/fix trigger:
- conflict resolution:

## Approval Gate
- approval detected: yes/no
- confirmation prompt: Proceed with this team? (yes/no)

## Execution Summary (only when approved)
- stage status:
- key outcomes:
- open blockers:
"""