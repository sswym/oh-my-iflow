description = "Quick toggle: set omi HUD visibility profile to compact."
prompt = """
Set omi HUD visibility profile to `compact`.

Protocol:
1. Apply `visibility = compact`.
2. If filesystem tools are available, write/update `.omi/state/hud.json` with source `omi:hud-compact`.
3. Provide one-line compact HUD preview and recommended follow-up command.

Output format:
## HUD
- applied: compact
- persisted:

## Preview
```text
[omi][MODE balanced][STAGE team-exec][TASKS 3/8][NEXT /omi:team-verify]
```

## Next Command
- /omi:status
"""
